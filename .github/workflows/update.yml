name: Quet 6 nguon v4.4.18 - Phao Hoa hien du lich

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: multi-source-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 1. Lay code tu kho ve
        uses: actions/checkout@v4
        with:
          fetch-depth: 3

      - name: 2. Cai dat Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Cai dat Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: 4. Audit source va bo gop offline
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile main.py merger.py sources/hybrid_support.py sources/chuoichien.py sources/luongson.py sources/gavang.py sources/xoilac.py sources/colatv.py sources/phaohoa.py
          python -m unittest discover -s tests -v

      - name: 5. Quet sau nguon va hien log realtime
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
          MULTI_RUN_SOURCES_PARALLEL: "1"
          MULTI_SOURCE_MAX_WORKERS: "3"
          MULTI_MAX_STREAMS_PER_MATCH: "2"
          MULTI_UPCOMING_KEEP_HOURS: "4"
          MULTI_PENDING_PAST_MINUTES: "150"
          MULTI_KEEP_GAVANG_UNKNOWN_PENDING: "1"

          SOCOLIVE_HOME_URLS: "https://live04.chuoichientv.me/,https://live03.chuoichientv.me/"
          SOCOLIVE_MATCH_CONCURRENCY: "3"
          SOCOLIVE_HOME_WAIT_MS: "5000"
          SOCOLIVE_ROOM_WAIT_SECONDS: "20"
          SOCOLIVE_SCAN_PAST_MINUTES: "150"
          SOCOLIVE_SCAN_FUTURE_MINUTES: "240"
          SOCOLIVE_HYBRID_HTTP_FIRST: "1"
          SOCOLIVE_HTTP_DISCOVERY_TIMEOUT_SECONDS: "8"
          SOCOLIVE_HTTP_DISCOVERY_MAX_FOLLOWS: "4"
          SOCOLIVE_DELTA_SCAN_ENABLED: "1"
          SOCOLIVE_DELTA_NEAR_MINUTES: "45"
          SOCOLIVE_STATE_PATH: "chuoichien_state.json"
          SOCOLIVE_SCAN_UNKNOWN_LIVE: "1"
          SOCOLIVE_FULL_SCAN: "1"
          SOCOLIVE_VERIFY_STREAMS: "1"
          SOCOLIVE_VERIFY_TIMEOUT_SECONDS: "6"
          SOCOLIVE_MAX_VERIFY_CANDIDATES: "4"
          SOCOLIVE_MAX_OUTPUT_STREAMS_PER_MATCH: "2"
          SOCOLIVE_UPCOMING_KEEP_HOURS: "4"
          SOCOLIVE_UPCOMING_FAR_THRESHOLD_MINUTES: "45"
          SOCOLIVE_UPCOMING_FAR_WAIT_SECONDS: "7"
          SOCOLIVE_UPCOMING_NEAR_WAIT_SECONDS: "12"
          SOCOLIVE_KEEP_PREVIOUS_UNVERIFIED: "0"
          SOCOLIVE_ALLOW_UNVERIFIED_BROWSER_FALLBACK: "0"

          HYGENIE_HOME_URLS: "https://catbee.io/,https://hygenie.io/"
          HYGENIE_MATCH_CONCURRENCY: "3"
          HYGENIE_HOME_WAIT_MS: "6000"
          HYGENIE_ROOM_WAIT_SECONDS: "20"
          HYGENIE_SCAN_PAST_MINUTES: "150"
          HYGENIE_SCAN_FUTURE_MINUTES: "240"
          HYGENIE_HYBRID_HTTP_FIRST: "1"
          HYGENIE_HTTP_DISCOVERY_TIMEOUT_SECONDS: "8"
          HYGENIE_HTTP_DISCOVERY_MAX_FOLLOWS: "4"
          HYGENIE_DELTA_SCAN_ENABLED: "1"
          HYGENIE_DELTA_NEAR_MINUTES: "45"
          HYGENIE_DOMAIN_STREAM_FAILOVER: "1"
          HYGENIE_DOMAIN_FAILOVER_NEAR_MINUTES: "45"
          HYGENIE_MATCH_VARIANT_FALLBACKS: "2"
          HYGENIE_STATE_PATH: "hygenie_state.json"
          HYGENIE_SCAN_UNKNOWN_LIVE: "1"
          HYGENIE_FULL_SCAN: "1"
          HYGENIE_VERIFY_STREAMS: "1"
          HYGENIE_VERIFY_TIMEOUT_SECONDS: "6"
          HYGENIE_MAX_VERIFY_CANDIDATES: "4"
          HYGENIE_MAX_OUTPUT_STREAMS_PER_MATCH: "2"
          HYGENIE_UPCOMING_FAR_THRESHOLD_MINUTES: "45"
          HYGENIE_UPCOMING_FAR_WAIT_SECONDS: "7"
          HYGENIE_UPCOMING_NEAR_WAIT_SECONDS: "12"

          GAVANG_HOME_URLS: "https://smorf.io/"
          GAVANG_SOURCE_LOGO_URL: "https://smorf.io/favicon.ico"
          GAVANG_MATCH_CONCURRENCY: "3"
          GAVANG_HOME_WAIT_MS: "6000"
          GAVANG_ROOM_WAIT_SECONDS: "16"
          GAVANG_SCAN_PAST_MINUTES: "150"
          GAVANG_SCAN_FUTURE_MINUTES: "240"
          GAVANG_HYBRID_HTTP_FIRST: "1"
          GAVANG_HTTP_DISCOVERY_TIMEOUT_SECONDS: "8"
          GAVANG_HTTP_DISCOVERY_MAX_FOLLOWS: "3"
          GAVANG_DELTA_SCAN_ENABLED: "1"
          GAVANG_DELTA_NEAR_MINUTES: "45"
          GAVANG_STATE_PATH: "gavang_state.json"
          GAVANG_SCAN_UNKNOWN_LIVE: "1"
          GAVANG_PROBE_UNKNOWN_STREAM_KEYS: "1"
          GAVANG_KEEP_DERIVED_PENDING: "1"
          GAVANG_KEEP_UNKNOWN_TIME_PENDING: "1"
          GAVANG_FULL_SCAN: "1"
          GAVANG_VERIFY_STREAMS: "1"
          GAVANG_VERIFY_TIMEOUT_SECONDS: "7"
          GAVANG_MAX_VERIFY_CANDIDATES: "4"
          GAVANG_MAX_OUTPUT_STREAMS_PER_MATCH: "2"
          GAVANG_UPCOMING_KEEP_HOURS: "4"
          GAVANG_UPCOMING_FAR_THRESHOLD_MINUTES: "45"
          GAVANG_UPCOMING_FAR_WAIT_SECONDS: "6"
          GAVANG_UPCOMING_NEAR_WAIT_SECONDS: "10"
          GAVANG_KEEP_PREVIOUS_UNVERIFIED: "0"
          GAVANG_ALLOW_UNVERIFIED_BROWSER_FALLBACK: "0"

          XOILAC_HOME_URLS: "https://xoilacz.io/,https://malaysiandigest.com/,https://altenergystocks.com/"
          XOILAC_SOURCE_WAIT_SECONDS: "12"
          XOILAC_HOME_WAIT_SECONDS: "5"
          XOILAC_AFTER_FIRST_WAIT: "2"
          XOILAC_NAVIGATION_TIMEOUT: "35"
          XOILAC_VERIFY_STREAMS: "1"
          XOILAC_VERIFY_TIMEOUT: "8"
          XOILAC_MAX_SOURCES_PER_MATCH: "4"
          XOILAC_TOKEN_REFRESH_ATTEMPTS: "2"
          XOILAC_MIN_TOKEN_SECONDS: "600"
          XOILAC_SCAN_PAST_MINUTES: "150"
          XOILAC_SCAN_FUTURE_MINUTES: "240"
          XOILAC_WRITE_AUDIT_M3U: "0"

          COLATV_HOME_URLS: "https://colatv77.live/"
          COLATV_MATCH_CONCURRENCY: "3"
          COLATV_HOME_WAIT_MS: "6000"
          COLATV_ROOM_WAIT_SECONDS: "20"
          COLATV_SCAN_PAST_MINUTES: "150"
          COLATV_SCAN_FUTURE_MINUTES: "240"
          COLATV_HYBRID_HTTP_FIRST: "1"
          COLATV_HTTP_DISCOVERY_TIMEOUT_SECONDS: "8"
          COLATV_HTTP_DISCOVERY_MAX_FOLLOWS: "4"
          COLATV_DELTA_SCAN_ENABLED: "1"
          COLATV_DELTA_NEAR_MINUTES: "45"
          COLATV_STATE_PATH: "colatv_state.json"
          COLATV_SCAN_UNKNOWN_LIVE: "1"
          COLATV_FULL_SCAN: "1"
          COLATV_VERIFY_STREAMS: "1"
          COLATV_VERIFY_TIMEOUT_SECONDS: "7"
          COLATV_MAX_VERIFY_CANDIDATES: "5"
          COLATV_MAX_OUTPUT_STREAMS_PER_MATCH: "2"
          COLATV_UPCOMING_KEEP_HOURS: "4"
          COLATV_UPCOMING_FAR_THRESHOLD_MINUTES: "45"
          COLATV_UPCOMING_FAR_WAIT_SECONDS: "7"
          COLATV_UPCOMING_NEAR_WAIT_SECONDS: "12"
          COLATV_KEEP_PREVIOUS_UNVERIFIED: "0"
          COLATV_ALLOW_UNVERIFIED_BROWSER_FALLBACK: "0"
          PHAOHOA_HOME_URLS: "https://phaohoa1.live/"
          PHAOHOA_MATCH_CONCURRENCY: "3"
          PHAOHOA_HOME_WAIT_MS: "6000"
          PHAOHOA_ROOM_WAIT_SECONDS: "20"
          PHAOHOA_SCAN_PAST_MINUTES: "150"
          PHAOHOA_SCAN_FUTURE_MINUTES: "240"
          PHAOHOA_HYBRID_HTTP_FIRST: "1"
          PHAOHOA_HTTP_DISCOVERY_TIMEOUT_SECONDS: "8"
          PHAOHOA_HTTP_DISCOVERY_MAX_FOLLOWS: "4"
          PHAOHOA_DELTA_SCAN_ENABLED: "1"
          PHAOHOA_DELTA_NEAR_MINUTES: "45"
          PHAOHOA_STATE_PATH: "phaohoa_state.json"
          PHAOHOA_SCAN_UNKNOWN_LIVE: "1"
          PHAOHOA_FULL_SCAN: "1"
          PHAOHOA_VERIFY_STREAMS: "1"
          PHAOHOA_VERIFY_TIMEOUT_SECONDS: "7"
          PHAOHOA_MAX_VERIFY_CANDIDATES: "5"
          PHAOHOA_MAX_OUTPUT_STREAMS_PER_MATCH: "2"
          PHAOHOA_UPCOMING_KEEP_HOURS: "4"
          PHAOHOA_UPCOMING_FAR_THRESHOLD_MINUTES: "45"
          PHAOHOA_UPCOMING_FAR_WAIT_SECONDS: "7"
          PHAOHOA_UPCOMING_NEAR_WAIT_SECONDS: "12"
          PHAOHOA_KEEP_PREVIOUS_UNVERIFIED: "0"
          PHAOHOA_ALLOW_UNVERIFIED_BROWSER_FALLBACK: "0"
          PHAOHOA_LIST_ALL_DISCOVERED_MATCHES: "1"
          PHAOHOA_PLACEHOLDER_USE_MATCH_PAGE: "1"
        run: |
          set -o pipefail
          python -u main.py 2>&1 | tee multi_source_scan.log

      - name: 6. Audit playlist chung
        shell: bash
        run: |
          set -euo pipefail
          test -f all_live.m3u
          test -f all_live_debug.json

          mapfile -t generated_m3u < <(find . -type f -name '*.m3u' -printf '%P\n' | sort)
          if [[ ${#generated_m3u[@]} -ne 1 || "${generated_m3u[0]}" != "all_live.m3u" ]]; then
            echo "::error::Sau khi gộp chỉ được tồn tại duy nhất all_live.m3u. Đang có: ${generated_m3u[*]:-không có}"
            exit 1
          fi

          if grep -E '^https?://.*\|User-Agent=' all_live.m3u; then
            echo "::error::Playlist mac dinh khong duoc noi pipe header vao URL."
            exit 1
          fi

          python - <<'PY_AUDIT'
          import json
          import re
          from collections import Counter
          from pathlib import Path

          report = json.loads(Path("all_live_debug.json").read_text(encoding="utf-8"))
          failures = []
          warnings = []
          urls = []
          per_match_quality = Counter()

          # Scanner phải lọc TRƯỚC khi mở trang trận: -150 phút đến +240 phút.
          for debug_name in ("chuoichien_debug.json", "hygenie_debug.json", "gavang_debug.json", "xoilac_debug.json", "colatv_debug.json", "phaohoa_debug.json"):
              debug_path = Path(debug_name)
              if not debug_path.exists():
                  continue
              payload = json.loads(debug_path.read_text(encoding="utf-8"))
              rows = payload if isinstance(payload, list) else payload.get("results", [])
              for row in rows:
                  delta = row.get("minutes_to_kickoff")
                  reason = row.get("scan_window_reason", "")
                  scan_attempted = bool(row.get("scan_attempted"))
                  if isinstance(delta, int) and not (-150 <= delta <= 240):
                      if debug_name == "phaohoa_debug.json" and not scan_attempted:
                          # Pháo Hoa được phép giữ toàn bộ card lịch trong M3U; chỉ player scan mới phải theo cửa sổ.
                          pass
                      else:
                          failures.append(f"{debug_name}: quét ngoài cửa sổ {delta} phút: {row.get('url')}")
                  if delta is None and reason not in {"unknown-time-live", "unknown-time-derived-probe", ""}:
                      failures.append(f"{debug_name}: lý do giờ không hợp lệ {reason}: {row.get('url')}")

          expected_groups = {"chuoichien": "Chuối Chiên", "luongson": "Lương Sơn", "gavang": "Gà Vàng", "xoilac": "Xôi Lạc", "colatv": "ColaTV", "phaohoa": "Pháo Hoa TV"}
          for channel in report.get("channels", []):
              url = channel.get("url", "")
              urls.append(url)
              expected_group = expected_groups.get(channel.get("source"))
              if channel.get("group") != expected_group:
                  failures.append(f"Sai nhóm nguồn: {channel.get('source')} -> {channel.get('group')} (cần {expected_group})")
              allowed_playability = {"verified", "browser-observed", "upcoming-pending"}
              if channel.get("source") == "phaohoa":
                  allowed_playability.add("metadata-only")
              if channel.get("playability") not in allowed_playability:
                  failures.append(f"Trang thai khong hop le: {url}")
              key = (channel.get("match_key"), channel.get("quality"))
              per_match_quality[key] += 1
              if channel.get("source") == "gavang":
                  logo = str(channel.get("logo") or "")
                  if not re.match(r"^https?://", logo) or "[object object]" in logo.lower():
                      warnings.append(f"Gà Vàng logo không hợp lệ nhưng stream vẫn giữ: {url} | logo={logo!r}")
                  if channel.get("playability") == "upcoming-pending":
                      if not channel.get("derived_pending"):
                          failures.append(f"Gà Vàng pending không phải FLV dựng: {url}")
                      if not url.lower().split("?", 1)[0].endswith(".flv"):
                          failures.append(f"Gà Vàng pending không phải FLV: {url}")
                  display_name = str(channel.get("display_name") or "")
                  if channel.get("playability") == "upcoming-pending" and not channel.get("kickoff_iso"):
                      if not re.match(r"^\[(?:CHƯA CÓ GIỜ|CHƯA CÓ LỊCH|(?:[01]\d|2[0-3]):[0-5]\d CHƯA RÕ NGÀY)", display_name):
                          failures.append(f"Gà Vàng pending thiếu lịch phải ghi rõ trạng thái lịch: {display_name} | {url}")
                      warnings.append(f"Gà Vàng pending chưa lấy được đủ giờ; giữ link và sẽ thử lại: {url}")
                  if re.search(r"\b(?:kork1|kork2|chnfa|ausffa|c1qual|c3qual|uzbsuper|intcf)\b", display_name, re.I):
                      warnings.append(f"Gà Vàng tên còn dấu hiệu slug kỹ thuật: {display_name} | {url}")
                  metadata_audit = channel.get("metadata_audit")
                  if metadata_audit == "warn-only":
                      warnings.append(
                          f"Gà Vàng metadata chưa đủ chắc chắn nhưng stream vẫn giữ: "
                          f"{url} | {channel.get('metadata_warning') or 'không có đối chiếu phù hợp'}"
                      )

              if channel.get("source") == "phaohoa" and channel.get("playability") == "metadata-only":
                  from urllib.parse import urlparse
                  parsed = urlparse(url)
                  page_url = str(channel.get("page_url") or "")
                  page_parsed = urlparse(page_url)
                  display_name = str(channel.get("display_name") or "")
                  if channel.get("entry_mode") != "metadata-only":
                      failures.append(f"Pháo Hoa metadata-only thiếu entry_mode: {url}")
                  if (parsed.hostname or "").lower() not in {"127.0.0.1", "localhost"}:
                      failures.append(f"Pháo Hoa placeholder không phải loopback: {url}")
                  if parsed.port not in {None, 9}:
                      failures.append(f"Pháo Hoa placeholder sai cổng an toàn: {url}")
                  if not parsed.path.startswith("/__phaohoa_metadata__/") or not parsed.path.lower().endswith(".m3u8"):
                      failures.append(f"Pháo Hoa placeholder sai đường dẫn: {url}")
                  if channel.get("kind") != "placeholder-m3u8":
                      failures.append(f"Pháo Hoa metadata-only sai kind: {channel.get('kind')} | {url}")
                  if (page_parsed.hostname or "").lower() not in {"phaohoa1.live", "www.phaohoa1.live"}:
                      failures.append(f"Pháo Hoa metadata-only thiếu URL trang trận hợp lệ: {page_url}")
                  if not re.search(r"/(?:truc-tiep|live|room)/", page_parsed.path, re.I):
                      failures.append(f"Pháo Hoa page_url không phải trang trận: {page_url}")
                  if re.search(r"github\.com/.+/blob/", url, re.I) or re.search(r"/(?:truc-tiep|live|room)/", parsed.path, re.I):
                      failures.append(f"Pháo Hoa lọt URL HTML làm dòng phát: {url}")
                  if not re.search(r"\bvs\b", display_name, re.I):
                      failures.append(f"Pháo Hoa metadata-only thiếu đúng tên hai đội: {display_name} | {url}")
                  if not channel.get("home_logo") or not channel.get("away_logo"):
                      warnings.append(f"Pháo Hoa chưa lấy đủ hai logo: {display_name} | {url}")

              if channel.get("source") == "xoilac":
                  classification = str(channel.get("classification") or "")
                  signed = bool(channel.get("has_secret"))
                  if classification in {"placeholder_or_ad", "dead", "expired", "unverified"}:
                      failures.append(f"Xôi Lạc lọt stream bị loại vào playlist: {classification} | {url}")
                  if "live2.streambylivepulse.com" in url.lower() and not signed:
                      failures.append(f"Xôi Lạc lọt player quảng cáo live2 không wsSecret: {url}")
                  expiry = channel.get("expiry") or {}
                  seconds_left = expiry.get("seconds_left") if isinstance(expiry, dict) else None
                  if signed and isinstance(seconds_left, int) and seconds_left <= 60:
                      failures.append(f"Xôi Lạc lọt token hết hạn/sắp hết hạn: còn {seconds_left}s | {url}")

          for url in urls:
              if re.search(r"github\.com/.+/blob/", url, re.I):
                  failures.append(f"Playlist chung chứa URL GitHub blob HTML: {url}")

          if len(urls) != len(set(urls)):
              failures.append("Playlist chung co URL trung lap")

          for (match_key, quality), count in per_match_quality.items():
              if count > 1:
                  failures.append(f"Trung chat luong {quality} trong {match_key}: {count}")

          text = Path("all_live.m3u").read_text(encoding="utf-8")
          for line in text.splitlines():
              if line.startswith("#EXTINF"):
                  match = re.search(r'group-title="([^"]+)"', line)
                  if not match or match.group(1) not in {"Chuối Chiên", "Lương Sơn", "Gà Vàng", "Xôi Lạc", "ColaTV", "Pháo Hoa TV"}:
                      failures.append(f"group-title khong hop le: {line}")
                  if "CHỜ PHÁT" in line.upper():
                      failures.append(f"Tên kênh không được chứa nhãn CHỜ PHÁT: {line}")

          for item in warnings:
              print(f"::warning::{item}")

          if failures:
              for item in failures:
                  print(f"::error::{item}")
              raise SystemExit(1)

          print(
              f"Audit OK: {len(urls)} stream chung; nguon={report.get('sources')} | "
              f"gavang_metadata={report.get('gavang_metadata')} | gavang_logo={report.get('gavang_logo')} | metadata_refs={report.get('metadata_reference_count')} | warnings={len(warnings)}"
          )
          PY_AUDIT

          echo "--- Playlist chung ---"
          sed -n '1,160p' all_live.m3u

      - name: 7. Tai artifact debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multi-source-debug-${{ github.run_id }}
          path: |
            all_live.m3u
            all_live_debug.json
            chuoichien_debug.json
            hygenie_debug.json
            gavang_debug.json
            xoilac_debug.json
            colatv_debug.json
            phaohoa_debug.json
            *_home_debug.html
            *_home_debug.png
            multi_source_scan.log
            chuoichien_state.json
            hygenie_state.json
            gavang_state.json
            colatv_state.json
            phaohoa_state.json
          if-no-files-found: ignore
          retention-days: 3

      - name: 8. Luu playlist len GitHub
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          test -f all_live.m3u

          # Xóa các playlist nhiều-file của bản cũ khỏi repository nếu chúng từng được commit.
          old_playlists=(
            all_live_pipe.m3u all_live_vlc.m3u
            chuoichien_live.m3u chuoichien_live_pipe.m3u chuoichien_live_vlc.m3u
            hygenie_live.m3u hygenie_live_pipe.m3u hygenie_live_vlc.m3u
            gavang_live.m3u gavang_live_pipe.m3u gavang_live_vlc.m3u
            xoilac_live.m3u xoilac_live_pipe.m3u xoilac_live_vlc.m3u
            colatv_live.m3u colatv_live_pipe.m3u colatv_live_vlc.m3u
            phaohoa_live.m3u phaohoa_live_pipe.m3u phaohoa_live_vlc.m3u
            xoilac_runner_verified.m3u xoilac_all_candidates.m3u xoilac_rejected.m3u
            luongson_live.m3u luongson_live_pipe.m3u luongson_live_vlc.m3u
            chuoichien/chuoichien_live.m3u chuoichien/chuoichien_live_pipe.m3u chuoichien/chuoichien_live_vlc.m3u
            luongson/hygenie_live.m3u luongson/hygenie_live_pipe.m3u luongson/hygenie_live_vlc.m3u
            gavang/gavang_live.m3u gavang/gavang_live_pipe.m3u gavang/gavang_live_vlc.m3u
            xoilac/xoilac_live.m3u xoilac/xoilac_live_pipe.m3u xoilac/xoilac_live_vlc.m3u
            colatv/colatv_live.m3u colatv/colatv_live_pipe.m3u colatv/colatv_live_vlc.m3u
            phaohoa/phaohoa_live.m3u phaohoa/phaohoa_live_pipe.m3u phaohoa/phaohoa_live_vlc.m3u
          )
          git rm -f --ignore-unmatch -- "${old_playlists[@]}"
          files_to_add=(all_live.m3u all_live_debug.json)
          [[ -f chuoichien_state.json ]] && files_to_add+=(chuoichien_state.json)
          [[ -f hygenie_state.json ]] && files_to_add+=(hygenie_state.json)
          [[ -f gavang_state.json ]] && files_to_add+=(gavang_state.json)
          [[ -f colatv_state.json ]] && files_to_add+=(colatv_state.json)
          [[ -f phaohoa_state.json ]] && files_to_add+=(phaohoa_state.json)
          git add -- "${files_to_add[@]}"
          if git diff --cached --quiet; then
            echo "Playlist khong thay doi; khong can commit."
            exit 0
          fi

